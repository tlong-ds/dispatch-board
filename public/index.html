<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Host View - Item Dispatch</title>
        <style>
            @font-face {
                font-family: "PressStart2P";
                src: url("./PressStart2P-Regular.ttf") format("truetype");
            }
            :root {
                --bg: #f7f7f7;
                --text: #535454;
                --primary: #535454;
                --success: #535454;
            }
            body {
                margin: 0;
                font-family: "PressStart2P", system-ui, sans-serif;
                background-color: var(--bg);
                color: var(--text);
                display: flex;
                flex-direction: column;
                height: 100vh;
                overflow: hidden;
                position: relative;
            }
            header {
                padding: 1.5rem;
                display: flex;
                justify-content: space-between;
                align-items: center;
                z-index: 10;
            }
            h1 {
                margin: 0;
                font-size: 1.5rem;
                text-transform: uppercase;
                line-height: 1.5;
            }
            .btn {
                color: var(--bg);
                background-color: var(--text);
                border: 4px solid var(--text);
                padding: 1rem 1.5rem;
                cursor: pointer;
                font-family: "PressStart2P", system-ui, sans-serif;
                font-size: 0.8rem;
                transition: transform 0.1s;
            }
            .btn:active {
                transform: translateY(4px);
            }
            .btn-sm {
                padding: 0.8rem 1rem;
                font-size: 0.6rem;
            }
            .container {
                display: flex;
                flex: 1;
                overflow: hidden;
                z-index: 10;
                padding-bottom: 80px;
                gap: 1.5rem;
                padding-left: 1.5rem;
                padding-right: 1.5rem;
            }
            .items-panel,
            .teams-panel {
                flex: 1;
                overflow-y: auto;
            }
            .items-panel {
                display: flex;
                flex-direction: column;
                flex: 1;
                overflow-y: auto;
                transition: flex 0.3s ease;
            }
            .items-panel.collapsed {
                flex: 0 0 auto;
            }
            .items-panel.collapsed #bulkItemsTextarea,
            .items-panel.collapsed #itemsHelperText,
            .items-panel.collapsed #itemsPanelTitle {
                display: none;
            }
            .teams-panel {
                flex: 1;
                overflow-y: auto;
            }
            .panel-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 1rem;
            }
            h2 {
                margin: 0;
                font-size: 1rem;
                color: var(--text);
            }
            select {
                background: #fff;
                color: var(--text);
                border: 2px solid var(--text);
                padding: 0.5rem;
                font-family: "PressStart2P", system-ui, sans-serif;
                font-size: 0.6rem;
                cursor: pointer;
            }
            .team-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                gap: 1.5rem;
                padding-bottom: 2rem;
            }
            .team-card {
                background: white;
                border: 4px solid var(--text);
                box-shadow: 6px 6px 0px var(--text);
                padding: 1.5rem;
                position: relative;
                min-height: 150px;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
            .team-card-header {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                margin-bottom: 0.5rem;
                flex-direction: column;
                gap: 0.5rem;
            }
            .team-name-input {
                background: transparent;
                color: var(--text);
                border: none;
                font-size: 0.8rem;
                width: 100%;
                font-family: "PressStart2P", system-ui, sans-serif;
                padding: 0.2rem;
            }
            .team-name-input:focus {
                outline: none;
                border-bottom: 2px dashed var(--text);
            }
            .team-status {
                color: var(--text);
                font-size: 0.6rem;
                opacity: 0.7;
            }
            .team-item-display {
                margin-top: 1rem;
                font-size: 1rem;
                color: var(--text);
                height: 3.5rem;
                line-height: 1.5;
                overflow: hidden;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                word-break: break-word;
            }
            .team-controls {
                display: flex;
                gap: 0.5rem;
            }
            #bulkItemsTextarea {
                flex: 1;
                width: 100%;
                background: white;
                color: var(--text);
                border: 4px solid var(--text);
                box-shadow: 6px 6px 0px var(--text);
                padding: 1.5rem;
                padding-bottom: 120px;
                font-family: "PressStart2P", system-ui, sans-serif;
                font-size: 0.8rem;
                line-height: 1.8;
                resize: none;
                box-sizing: border-box;
            }
            #bulkItemsTextarea:focus {
                outline: none;
            }

            /* Decorative Background */
            .bg-road {
                position: absolute;
                bottom: 40px;
                left: 0;
                width: 200%;
                height: 20px;
                background: url("./extracted_assets/media/image12.svg") repeat-x
                    bottom center / auto 20px;
                z-index: 0;
            }
            .bg-road::before {
                content: "";
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                height: 40px;
                background: url("./extracted_assets/media/image6.svg") repeat-x
                    top center / auto 40px;
            }

            .bg-dino {
                position: absolute;
                bottom: 35px;
                left: 50px;
                width: 110px;
                height: 117px;
                background: url("./extracted_assets/media/image2.svg") no-repeat
                    center center / contain;
                z-index: 9999;
            }
            .bg-cactus-small {
                position: absolute;
                bottom: 35px;
                width: 50px;
                height: 75px;
                background: url("./extracted_assets/media/image8.svg") no-repeat
                    center center / contain;
                z-index: 9999;
            }
            .bg-cactus-large {
                position: absolute;
                bottom: 35px;
                width: 85px;
                height: 125px;
                background: url("./extracted_assets/media/image7.png") no-repeat
                    center bottom / contain;
                z-index: 9999;
            }
            .cloud-cluster-1 {
                position: absolute;
                top: 40px;
                width: 250px;
                height: 100px;
                animation: float 40s linear infinite;
                z-index: 0;
            }
            .cloud-cluster-2 {
                position: absolute;
                top: 70px;
                width: 300px;
                height: 120px;
                animation: float 55s linear infinite 20s;
                z-index: 0;
            }
            .cloud-cluster-3 {
                position: absolute;
                top: 20px;
                width: 200px;
                height: 90px;
                animation: float 30s linear infinite 10s;
                z-index: 0;
            }
            .cloud-part-1 {
                position: absolute;
                top: 15px;
                left: 0;
                width: 100px;
                height: 60px;
                background: url("./extracted_assets/media/image3.svg") no-repeat
                    center center / contain;
                opacity: 0.8;
            }
            .cloud-part-2 {
                position: absolute;
                top: 0;
                left: 60px;
                width: 140px;
                height: 80px;
                background: url("./extracted_assets/media/image4.svg") no-repeat
                    center center / contain;
                opacity: 0.6;
            }
            .cloud-part-3 {
                position: absolute;
                top: 25px;
                left: 150px;
                width: 90px;
                height: 50px;
                background: url("./extracted_assets/media/image3.svg") no-repeat
                    center center / contain;
                opacity: 0.9;
            }
            @keyframes float {
                from {
                    transform: translateX(100vw);
                }
                to {
                    transform: translateX(-100vw);
                }
            }
        </style>
    </head>
    <body>
        <div class="cloud-cluster-1" style="transform: translateX(100vw)">
            <div class="cloud-part-1"></div>
            <div class="cloud-part-2"></div>
            <div class="cloud-part-3"></div>
        </div>
        <div class="cloud-cluster-2" style="transform: translateX(100vw)">
            <div class="cloud-part-2" style="left: 0; top: 10px"></div>
            <div class="cloud-part-1" style="left: 100px; top: 0"></div>
        </div>
        <div class="cloud-cluster-3" style="transform: translateX(100vw)">
            <div class="cloud-part-3" style="left: 0; top: 10px"></div>
            <div class="cloud-part-1" style="left: 50px; top: 0"></div>
            <div class="cloud-part-2" style="left: 110px; top: 15px"></div>
        </div>
        <div class="bg-dino" id="dino"></div>
        <div class="bg-cactus-small" style="left: calc(50% + 300px)"></div>
        <div class="bg-cactus-large" style="left: calc(50% + 340px)"></div>
        <div class="bg-cactus-small" style="left: calc(50% + 420px)"></div>
        <div class="bg-cactus-large" style="left: calc(50% + 460px)"></div>
        <div class="bg-road"></div>

        <header>
            <h1>Dispatch Host</h1>
            <div>
                <button
                    class="btn btn-primary"
                    onclick="window.open('scoreboard.html', '_blank')"
                >
                    SCOREBOARD
                </button>
                <button
                    class="btn btn-primary"
                    onclick="window.open('dino-party', '_blank')"
                    style="margin-left: 10px"
                >
                    DINO PARTY
                </button>
                <button
                    class="btn btn-danger"
                    onclick="resetAll()"
                    style="margin-left: 10px"
                >
                    RESET TEAMS
                </button>
            </div>
        </header>

        <div class="container">
            <div class="items-panel" id="itemsPanel">
                <div class="panel-header">
                    <div
                        style="display: flex; align-items: center; gap: 0.5rem"
                    >
                        <button
                            id="toggleItemsBtn"
                            class="btn btn-primary"
                            onclick="toggleItemsPanel()"
                            style="padding: 0.3rem 0.6rem; font-size: 0.8rem"
                            title="Toggle item list"
                        >
                            ◀
                        </button>
                        <h2 id="itemsPanelTitle">Available Items</h2>
                    </div>
                    <span
                        id="saveStatus"
                        style="
                            font-size: 0.875rem;
                            color: var(--success);
                            opacity: 0;
                            transition: opacity 0.3s;
                        "
                        >Saved</span
                    >
                </div>
                <div
                    id="itemsHelperText"
                    style="
                        font-size: 0.875rem;
                        color: #9ca3af;
                        margin-bottom: 0.5rem;
                    "
                >
                    Each line is an item. Click away to save automatically.
                </div>
                <textarea
                    id="bulkItemsTextarea"
                    placeholder="Type items here, one per line..."
                ></textarea>
            </div>

            <div class="teams-panel">
                <div class="panel-header">
                    <h2>Teams Overview</h2>
                    <div class="team-controls">
                        <button
                            class="btn btn-primary"
                            onclick="removeLastTeam()"
                            title="Remove last team"
                        >
                            −
                        </button>
                        <button
                            class="btn btn-primary"
                            onclick="addTeam()"
                            title="Add team"
                        >
                            +
                        </button>
                    </div>
                </div>
                <div class="team-grid" id="teamGrid">
                    <!-- Generated by JS -->
                </div>
            </div>
        </div>

        <script>
            const API_BASE_URL = "__API_BASE_URL__".startsWith("__")
                ? "http://localhost:3000"
                : "__API_BASE_URL__"; // Replaced by GitHub Actions
            let currentState = null;
            let isItemsTyping = false;
            let activeDropdownSelections = {}; // To preserve dropdown state

            function toggleItemsPanel() {
                const panel = document.getElementById("itemsPanel");
                const btn = document.getElementById("toggleItemsBtn");
                if (panel.classList.contains("collapsed")) {
                    panel.classList.remove("collapsed");
                    btn.textContent = "◀";
                    btn.title = "Collapse item list";
                } else {
                    panel.classList.add("collapsed");
                    btn.textContent = "▶";
                    btn.title = "Expand item list";
                }
            }

            function getAdminPassword() {
                let pwd = sessionStorage.getItem("adminPassword");
                if (!pwd) {
                    pwd = prompt("Enter Admin Password:");
                    if (pwd) sessionStorage.setItem("adminPassword", pwd);
                }
                return pwd || "";
            }

            async function apiFetch(path, options = {}) {
                const headers = {
                    ...options.headers,
                    "x-admin-password": getAdminPassword(),
                };
                const res = await fetch(API_BASE_URL + path, {
                    cache: "no-store",
                    ...options,
                    headers,
                });
                if (res.status === 401) {
                    sessionStorage.removeItem("adminPassword");
                    alert(
                        "Invalid or missing admin password. Please try again.",
                    );
                    window.location.reload();
                    throw new Error("Unauthorized");
                }
                return res;
            }

            const textarea = document.getElementById("bulkItemsTextarea");

            textarea.addEventListener("focusin", () => (isItemsTyping = true));
            textarea.addEventListener("focusout", () => {
                isItemsTyping = false;
                saveBulkItems();
            });

            function escapeHtml(unsafe) {
                if (!unsafe) return "";
                return unsafe
                    .toString()
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }

            function getQrUrl(hashId) {
                // Construct absolute URL for QR code, safely handling GitHub pages subdirectory
                const basePath = window.location.pathname
                    .replace(/index\.html$/, "")
                    .replace(/\/$/, "");
                const url =
                    window.location.origin +
                    basePath +
                    "/team.html?id=" +
                    hashId;
                return `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(url)}`;
            }

            function expandQr(hashId) {
                const url = getQrUrl(hashId);
                const modal = document.createElement("div");
                modal.style.position = "fixed";
                modal.style.top = "0";
                modal.style.left = "0";
                modal.style.width = "100vw";
                modal.style.height = "100vh";
                modal.style.backgroundColor = "rgba(0,0,0,0.8)";
                modal.style.display = "flex";
                modal.style.alignItems = "center";
                modal.style.justifyContent = "center";
                modal.style.zIndex = "9999";
                modal.style.cursor = "zoom-out";
                modal.style.transition = "opacity 0.2s";

                const img = document.createElement("img");
                img.src = url;
                img.style.width = "300px";
                img.style.height = "300px";
                img.style.backgroundColor = "white";
                img.style.padding = "15px";
                img.style.borderRadius = "12px";
                img.style.boxShadow = "0 10px 25px rgba(0,0,0,0.5)";
                img.style.transform = "scale(0.8)";
                img.style.transition = "transform 0.2s";

                modal.appendChild(img);
                modal.onclick = () => {
                    modal.style.opacity = "0";
                    setTimeout(() => document.body.removeChild(modal), 200);
                };

                document.body.appendChild(modal);

                // Trigger animations
                requestAnimationFrame(() => {
                    img.style.transform = "scale(1)";
                });
            }

            async function fetchState() {
                try {
                    const res = await apiFetch("/api/state");
                    currentState = await res.json();
                    render();
                } catch (err) {
                    console.error(err);
                }
            }

            async function saveBulkItems() {
                const text = textarea.value;
                const items = text.split("\n");
                await apiFetch("/api/items/bulk", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ items }),
                });

                const saveStatus = document.getElementById("saveStatus");
                saveStatus.style.opacity = 1;
                setTimeout(() => (saveStatus.style.opacity = 0), 2000);

                fetchState();
            }

            // Teams API
            async function addTeam() {
                const nextId = Object.keys(currentState.teams || {}).length + 1;
                const name = `Team ${nextId}`;
                await apiFetch("/api/teams", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name }),
                });
                fetchState();
            }

            async function removeLastTeam() {
                const teamKeys = Object.keys(currentState.teams || {}).sort();
                if (teamKeys.length === 0) return;

                const lastKey = teamKeys[teamKeys.length - 1];
                const teamToRemove = currentState.teams[lastKey];

                if (teamToRemove) {
                    await apiFetch(`/api/teams/${teamToRemove._id}`, {
                        method: "DELETE",
                    });
                    fetchState();
                }
            }

            async function updateTeamName(id, newName, oldName) {
                if (!newName || newName.trim() === "" || newName === oldName) {
                    render(); // revert to old name if invalid
                    return;
                }
                await apiFetch(`/api/teams/${id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name: newName.trim() }),
                });
                fetchState();
            }

            // Send / Reset
            async function assignItemToTeam(teamId, itemText) {
                if (!itemText) return alert("Select an item first");

                if (itemText === "Random") {
                    const sentItems = Object.values(currentState.teams)
                        .map((t) => t.item)
                        .filter(Boolean);
                    const availableItems = (currentState.items || []).filter(
                        (w) => !sentItems.includes(w),
                    );
                    if (availableItems.length === 0)
                        return alert("No available items to assign randomly!");
                    const randomIndex = Math.floor(
                        Math.random() * availableItems.length,
                    );
                    itemText = availableItems[randomIndex];
                }

                await apiFetch("/api/send", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ teamId, item: itemText }),
                });
                fetchState();
            }

            function handleDropdownChange(selectElement) {
                activeDropdownSelections[selectElement.id] =
                    selectElement.value;
            }

            async function resetAll() {
                if (
                    !confirm(
                        "Are you sure you want to clear items for all teams?",
                    )
                )
                    return;
                await apiFetch("/api/reset", { method: "POST" });
                fetchState();
            }

            function render() {
                if (!currentState || !currentState.teams) return;

                // Capture current dropdown selections before re-rendering
                const selects = document.querySelectorAll(
                    'select[id^="assign-"]',
                );
                selects.forEach((sel) => {
                    activeDropdownSelections[sel.id] = sel.value;
                });

                if (!isItemsTyping) {
                    textarea.value = (currentState.items || []).join("\n");
                }

                const sentItems = Object.values(currentState.teams)
                    .map((t) => t.item)
                    .filter(Boolean);

                // Render Teams
                const teamGrid = document.getElementById("teamGrid");
                teamGrid.innerHTML = Object.entries(currentState.teams)
                    .map(([id, team]) => {
                        const options = (currentState.items || [])
                            .map((w) => {
                                const isUsed = sentItems.includes(w);
                                return `<option value="${escapeHtml(w)}" ${isUsed ? "disabled" : ""}>${escapeHtml(w)} ${isUsed ? "(Used)" : ""}</option>`;
                            })
                            .join("");

                        // Add Random Option at the top
                        const randomOption = `<option value="Random" style="font-weight:bold; color:var(--primary);">🎲 Random</option>`;

                        return `
      <div class="team-card">
        <div class="team-card-header">
          <input type="text" class="team-name-input" value="${escapeHtml(team.name)}"
                 onblur="updateTeamName('${team._id}', this.value, '${escapeHtml(team.name)}')"
                 onkeypress="if(event.key === 'Enter') this.blur()"
                 title="Click to edit team name">
          <div class="team-status">${team.item ? "Item Assigned" : "Waiting..."}</div>
        </div>
        <div class="team-item-display">${team.item ? escapeHtml(team.item) : ""}</div>

        <div style="margin-top: 1rem; display: flex; gap: 0.5rem; align-items: center;">
          <select id="assign-${id}" style="flex:1; min-width: 0; text-overflow: ellipsis;" onchange="handleDropdownChange(this)">
            <option value="" disabled selected>Assign item...</option>
            ${randomOption}
            ${options}
          </select>
          <button class="btn btn-primary btn-sm" onclick="assignItemToTeam('${id}', document.getElementById('assign-${id}').value)">Send</button>
        </div>

        <div style="margin-top: 15px; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.2); padding: 0.5rem; border-radius: 0.375rem;">
          <img src="${getQrUrl(team._id)}" alt="QR Code" width="50" height="50"
               style="border-radius: 4px; background: white; padding: 2px; cursor: zoom-in; transition: transform 0.2s;"
               onmouseover="this.style.transform='scale(1.05)'"
               onmouseout="this.style.transform='scale(1)'"
               onclick="expandQr('${team._id}')" title="Click to expand QR Code">
          <div style="font-size: 0.8rem; color: #9CA3AF;">
            Scan to join or <br>
            <a href="team.html?id=${team._id}" target="_blank" style="color: var(--primary); text-decoration: none; font-weight: 600;">Open Link</a>
          </div>
        </div>
      </div>
    `;
                    })
                    .join("");

                // Restore dropdown selections
                const newSelects = document.querySelectorAll(
                    'select[id^="assign-"]',
                );
                newSelects.forEach((sel) => {
                    if (activeDropdownSelections[sel.id]) {
                        sel.value = activeDropdownSelections[sel.id];
                    }
                });
            }

            let isTeamTyping = false;
            document.addEventListener("focusin", (e) => {
                if (e.target.classList.contains("team-name-input"))
                    isTeamTyping = true;
            });
            document.addEventListener("focusout", (e) => {
                if (e.target.classList.contains("team-name-input"))
                    isTeamTyping = false;
            });

            setInterval(() => {
                if (!isTeamTyping && !isItemsTyping) fetchState();
            }, 2000);

            fetchState();
        </script>

        <script src="sounds.js"></script>
    </body>
</html>
