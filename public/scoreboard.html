<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scoreboard - Item Dispatch</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <style>
    @font-face {
      font-family: 'PressStart2P';
      src: url('./PressStart2P-Regular.ttf') format('truetype'),
           url('PressStart2P-Regular.ttf') format('truetype'),
           url('../PressStart2P-Regular.ttf') format('truetype'),
           url('/PressStart2P-Regular.ttf') format('truetype');
    }
    :root {
      --bg: #F7F7F7;
      --text: #535454;
      --primary: #535454;
      --success: #535454;
      --danger: #EF4444;
    }
    body {
      margin: 0;
      font-family: 'PressStart2P', system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    header {
      padding: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }
    h1 {
      margin: 0;
      font-size: 1.5rem;
      text-transform: uppercase;
      line-height: 1.5;
    }
    .btn {
      color: var(--bg);
      background-color: var(--text);
      border: 4px solid var(--text);
      padding: 1rem 1.5rem;
      cursor: pointer;
      font-family: 'PressStart2P', system-ui, sans-serif;
      font-size: 0.8rem;
      transition: transform 0.1s;
    }
    .btn:active {
      transform: translateY(4px);
    }
    .btn-sm {
      padding: 0.8rem 1rem;
      font-size: 0.6rem;
    }
    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
      z-index: 10;
      padding-bottom: 80px;
      gap: 1.5rem;
      padding-left: 1.5rem;
      padding-right: 1.5rem;
    }
    .items-panel, .teams-panel {
      flex: 1;
      overflow-y: auto;
    }
    .items-panel {
      display: flex;
      flex-direction: column;
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    h2 {
      margin: 0;
      font-size: 1rem;
      color: var(--text);
    }
    select {
      background: #fff;
      color: var(--text);
      border: 2px solid var(--text);
      padding: 0.5rem;
      font-family: 'PressStart2P', system-ui, sans-serif;
      font-size: 0.6rem;
      cursor: pointer;
    }
    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      padding-bottom: 2rem;
    }
    .team-card {
      background: white;
      border: 4px solid var(--text);
      box-shadow: 6px 6px 0px var(--text);
      padding: 1.5rem;
      position: relative;
      min-height: 150px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .team-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.5rem;
      flex-direction: column;
      gap: 0.5rem;
    }
    .team-name-input {
      background: transparent;
      color: var(--text);
      border: none;
      font-size: 0.8rem;
      width: 100%;
      font-family: 'PressStart2P', system-ui, sans-serif;
      padding: 0.2rem;
    }
    .team-name-input:focus {
      outline: none;
      border-bottom: 2px dashed var(--text);
    }
    .team-status {
      color: var(--text);
      font-size: 0.6rem;
      opacity: 0.7;
    }
    .team-item-display {
      margin-top: 1rem;
      font-size: 1rem;
      color: var(--text);
      height: 3.5rem;
      line-height: 1.5;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      word-break: break-word;
    }
    .team-controls {
      display: flex;
      gap: 0.5rem;
    }
    #bulkItemsTextarea {
      flex: 1;
      width: 100%;
      background: white;
      color: var(--text);
      border: 4px solid var(--text);
      box-shadow: 6px 6px 0px var(--text);
      padding: 1.5rem;
      font-family: 'PressStart2P', system-ui, sans-serif;
      font-size: 0.8rem;
      line-height: 1.8;
      resize: none;
      box-sizing: border-box;
    }
    #bulkItemsTextarea:focus {
      outline: none;
    }

    /* Decorative Background */
    .bg-road {
      position: absolute;
      bottom: 40px;
      left: 0;
      width: 200%;
      height: 20px;
      background: url('./extracted_assets/media/image12.svg') repeat-x bottom center / auto 20px;
      z-index: 0;
    }
    .bg-road::before {
      content: "";
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      height: 40px;
      background: url('./extracted_assets/media/image6.svg') repeat-x top center / auto 40px;
    }

    .bg-dino {
      position: absolute;
      bottom: 35px;
      left: 50px;
      width: 110px;
      height: 117px;
      background: url('./extracted_assets/media/image2.svg') no-repeat center center / contain;
      z-index: 9999;
    }
    .bg-cactus-small {
      position: absolute;
      bottom: 35px;
      width: 50px;
      height: 75px;
      background: url('./extracted_assets/media/image8.svg') no-repeat center center / contain;
      z-index: 9999;
    }
    .bg-cactus-large {
      position: absolute;
      bottom: 35px;
      width: 85px;
      height: 125px;
      background: url('./extracted_assets/media/image7.png') no-repeat center bottom / contain;
      z-index: 9999;
    }
    .cloud-cluster-1 {
      position: absolute;
      top: 40px;
      width: 250px;
      height: 100px;
      animation: float 40s linear infinite;
      z-index: 0;
    }
    .cloud-cluster-2 {
      position: absolute;
      top: 70px;
      width: 300px;
      height: 120px;
      animation: float 55s linear infinite 20s;
      z-index: 0;
    }
    .cloud-cluster-3 {
      position: absolute;
      top: 20px;
      width: 200px;
      height: 90px;
      animation: float 30s linear infinite 10s;
      z-index: 0;
    }
    .cloud-part-1 {
      position: absolute;
      top: 15px;
      left: 0;
      width: 100px;
      height: 60px;
      background: url('./extracted_assets/media/image3.svg') no-repeat center center / contain;
      opacity: 0.8;
    }
    .cloud-part-2 {
      position: absolute;
      top: 0;
      left: 60px;
      width: 140px;
      height: 80px;
      background: url('./extracted_assets/media/image4.svg') no-repeat center center / contain;
      opacity: 0.6;
    }
    .cloud-part-3 {
      position: absolute;
      top: 25px;
      left: 150px;
      width: 90px;
      height: 50px;
      background: url('./extracted_assets/media/image3.svg') no-repeat center center / contain;
      opacity: 0.9;
    }
    @keyframes float {
      from { transform: translateX(100vw); }
      to { transform: translateX(-100vw); }
    }
  </style>
</head>
<body>

<div class="cloud-cluster-1" style="transform: translateX(100vw);">
  <div class="cloud-part-1"></div>
  <div class="cloud-part-2"></div>
  <div class="cloud-part-3"></div>
</div>
<div class="cloud-cluster-2" style="transform: translateX(100vw);">
  <div class="cloud-part-2" style="left: 0; top: 10px;"></div>
  <div class="cloud-part-1" style="left: 100px; top: 0;"></div>
</div>
<div class="cloud-cluster-3" style="transform: translateX(100vw);">
  <div class="cloud-part-3" style="left: 0; top: 10px;"></div>
  <div class="cloud-part-1" style="left: 50px; top: 0;"></div>
  <div class="cloud-part-2" style="left: 110px; top: 15px;"></div>
</div>
<div class="bg-dino" id="dino"></div>
<div class="bg-cactus-small" style="left: calc(50% + 300px);"></div>
<div class="bg-cactus-large" style="left: calc(50% + 340px);"></div>
<div class="bg-cactus-small" style="left: calc(50% + 420px);"></div>
<div class="bg-cactus-large" style="left: calc(50% + 460px);"></div>
<div class="bg-road"></div>

<div id="authOverlay" style="position:fixed; top:0; left:0; width:100vw; height:100vh; background:var(--bg); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <div style="background:var(--white); border:4px solid var(--text); padding:2rem; text-align:center; box-shadow:8px 8px 0 var(--text);">
        <h2 id="authTitle" style="margin-top:0; margin-bottom:1rem; font-size:1.2rem; text-transform:uppercase;">Admin Login</h2>
        <input type="password" id="adminPwdInput" placeholder="Password" style="padding:0.8rem; font-family:'PressStart2P',system-ui,sans-serif; font-size:0.8rem; border:2px solid var(--text); margin-bottom:1rem; width:200px; text-align:center;" onkeypress="if(event.key==='Enter') loginAdmin()">
        <br>
        <button class="btn" id="authBtn" onclick="loginAdmin()">LOGIN</button>
    </div>
</div>

<div id="appContainer" style="display: none; flex-direction: column; height: 100vh; width: 100%;">
<header>
  <h1>Dispatch Scoreboard</h1>
  <div style="display: flex; gap: 1rem;">
    <button class="btn btn-primary" style="background: #EF4444; color: white;" onclick="resetScores()">RESET SCORES</button>
    <button class="btn btn-primary" onclick="window.close()">BACK</button>
  </div>
</header>

<div class="container" style="align-items: flex-start;">
  
  <div style="flex: 0 0 auto; background: white; border: 4px solid var(--text); padding: 1.5rem; display: flex; flex-direction: column; align-items: center; box-shadow: 6px 6px 0px var(--text); z-index: 10; position: relative;">
    <h2 style="margin: 0 0 1rem 0;">COUNTDOWN</h2>
    <input type="text" id="timerDisplay" value="05:00" onfocus="startEditTimer()" onblur="finishEditTimer(this.value)" onkeydown="if(event.key === 'Enter') this.blur()" style="font-size: 3rem; margin-bottom: 1rem; cursor: pointer; border: none; background: transparent; text-align: center; color: var(--text); outline: none; font-family: 'PressStart2P', system-ui, sans-serif; width: 250px;" title="Click to edit timer">
    <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
      <button class="btn" style="background: var(--primary); color: white;" onclick="startTimer()">START</button>
      <button class="btn" style="background: #FBBF24; color: black;" onclick="pauseTimer()">PAUSE</button>
      <button class="btn" style="background: var(--danger); color: white;" onclick="resetTimer()">RESET</button>
    </div>
    
    <div style="display: flex; align-items: center; gap: 1rem; border-top: 2px dashed #ccc; padding-top: 1rem; width: 100%; justify-content: center;">
      <label style="font-size: 1rem;">SCORE TO WIN:</label>
      <input type="number" id="winThreshold" value="10" style="width: 80px; text-align: center; font-size: 1.2rem; padding: 0.5rem; border: 2px solid var(--text); font-family: 'PressStart2P', system-ui, sans-serif;">
    </div>
  </div>

  <div id="teamsGrid" class="team-grid" style="flex: 1; overflow-y: auto; align-content: flex-start;">
    <!-- Teams will be populated here -->
  </div>
</div>

<!-- Graffiti Modal -->
<div id="graffitiModal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; flex-direction: column;">
  <canvas id="confettiCanvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000; pointer-events: none;"></canvas>
  <div id="winnerName" style="position: relative; z-index: 10001; font-size: 4rem; color: #FF0055; text-shadow: 4px 4px 0 #00FFCC, -2px -2px 0 #FFEB3B, 0 0 20px #FF0055; transform: rotate(-5deg); margin-bottom: 2rem; text-align: center; line-height: 1.2;">
    TEAM WINS!
  </div>
  <button class="btn btn-primary" onclick="closeModal()" style="position: relative; z-index: 10001;">CONTINUE</button>
</div>

</div> <!-- End of appContainer -->

<script>
  let teamsData = {};
  
  // Timer State
  let timerInterval = null;
  let serverTimer = { isRunning: false, endTime: null, remaining: 300 };
  let isEditingTimer = false;

  function updateTimerDisplay() {
    if (isEditingTimer) return;
    
    let timeLeft = 0;
    if (serverTimer.isRunning && serverTimer.endTime) {
      timeLeft = Math.max(0, Math.floor((new Date(serverTimer.endTime).getTime() - Date.now()) / 1000));
    } else {
      timeLeft = serverTimer.remaining || 0;
    }
    
    const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
    const s = (timeLeft % 60).toString().padStart(2, '0');
    document.getElementById('timerDisplay').value = `${m}:${s}`;
  }

  function tick() {
    if (serverTimer.isRunning) {
      updateTimerDisplay();
    }
  }

  setInterval(tick, 1000);

  async function timerCommand(action, value = null) {
    try {
      const res = await apiFetch('/api/timer', {
        method: 'POST',
        body: JSON.stringify({ action, value })
      });
      if (res.ok) {
        const data = await res.json();
        serverTimer = data.timer;
        updateTimerDisplay();
      }
    } catch (err) {
      console.error('Timer command failed:', err);
    }
  }

  function startTimer() {
    timerCommand('start');
  }

  function pauseTimer() {
    timerCommand('pause');
  }

  function resetTimer() {
    timerCommand('reset');
  }

  function startEditTimer() {
    isEditingTimer = true;
  }

  function finishEditTimer(newTime) {
    isEditingTimer = false;
    if (newTime && newTime.trim() !== '') {
      let parsed = 0;
      if (newTime.includes(':')) {
        const parts = newTime.split(':');
        parsed = parseInt(parts[0] || '0', 10) * 60 + parseInt(parts[1] || '0', 10);
      } else {
        parsed = parseInt(newTime, 10);
      }
      if (!isNaN(parsed) && parsed >= 0) {
        timerCommand('set', parsed);
        return;
      } else {
        alert("Invalid time format. Use MM:SS or seconds.");
      }
    }
    updateTimerDisplay();
  }

  function closeModal() {
    document.getElementById('graffitiModal').style.display = 'none';
  }

  function playVictorySound() {
    try {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      function playTone(freq, startTime, duration) {
        // Oscillator 1 (Square wave for classic 8-bit sound)
        const osc1 = audioCtx.createOscillator();
        osc1.type = 'square';
        osc1.frequency.value = freq;
        
        // Oscillator 2 (Sawtooth wave, one octave lower for a fatter retro synth feel)
        const osc2 = audioCtx.createOscillator();
        osc2.type = 'sawtooth';
        osc2.frequency.value = freq / 2;
        
        const gain = audioCtx.createGain();
        // Envelope to prevent clicking
        gain.gain.setValueAtTime(0.0, audioCtx.currentTime + startTime);
        gain.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + startTime + 0.02);
        gain.gain.setValueAtTime(0.12, audioCtx.currentTime + startTime + duration - 0.05);
        gain.gain.linearRampToValueAtTime(0.0, audioCtx.currentTime + startTime + duration);
        
        osc1.connect(gain);
        osc2.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc1.start(audioCtx.currentTime + startTime);
        osc2.start(audioCtx.currentTime + startTime);
        osc1.stop(audioCtx.currentTime + startTime + duration);
        osc2.stop(audioCtx.currentTime + startTime + duration);
      }

      // Part 1: The classic intro
      playTone(523.25, 0.00, 0.12); // C5
      playTone(523.25, 0.12, 0.12); // C5
      playTone(523.25, 0.24, 0.12); // C5
      playTone(523.25, 0.36, 0.40); // C5 
      
      playTone(392.00, 0.76, 0.40); // G4
      playTone(466.16, 1.16, 0.40); // Bb4
      
      playTone(523.25, 1.56, 0.15); // C5
      playTone(466.16, 1.71, 0.15); // Bb4
      playTone(523.25, 1.86, 0.80); // C5
      
      // Part 2: The triumphant continuation
      playTone(659.25, 2.70, 0.20); // E5
      playTone(698.46, 2.90, 0.20); // F5
      playTone(783.99, 3.10, 0.40); // G5
      playTone(523.25, 3.50, 0.40); // C5
      
      playTone(659.25, 3.90, 0.20); // E5
      playTone(698.46, 4.10, 0.20); // F5
      playTone(783.99, 4.30, 0.40); // G5
      playTone(1046.50, 4.70, 1.20); // C6 (Big finish!)
    } catch (e) {
      console.log("Audio not supported or blocked", e);
    }
  }

  function checkWinner() {
    const threshold = parseInt(document.getElementById('winThreshold').value, 10);
    for (const id in teamsData) {
      if (teamsData[id].score >= threshold) {
        const modal = document.getElementById('graffitiModal');
        if (modal.style.display === 'none' || modal.style.display === '') {
          document.getElementById('winnerName').innerText = `${teamsData[id].name}\nWINS!`;
          modal.style.display = 'flex';
          fireConfetti();
          playVictorySound();
        }
        break; // Only show one winner at a time
      }
    }
  }

  function fireConfetti() {
    if (typeof confetti === 'function') {
      var myCanvas = document.getElementById('confettiCanvas');
      var myConfetti = confetti.create(myCanvas, { resize: true, useWorker: true });

      var duration = 3000;
      var end = Date.now() + duration;

      (function frame() {
        myConfetti({
          particleCount: 5,
          angle: 60,
          spread: 55,
          origin: { x: 0 },
          colors: ['#FF0055', '#00FFCC', '#FFEB3B', '#10B981']
        });
        myConfetti({
          particleCount: 5,
          angle: 120,
          spread: 55,
          origin: { x: 1 },
          colors: ['#FF0055', '#00FFCC', '#FFEB3B', '#10B981']
        });

        if (Date.now() < end) {
          requestAnimationFrame(frame);
        }
      }());
    }
  }

  const API_BASE_URL = '__API_BASE_URL__'.startsWith('__') ? 'http://localhost:3000' : '__API_BASE_URL__'; // Replaced by GitHub Actions

  let savedPassword = localStorage.getItem("adminPassword") || "";

  async function hashPassword(pwd) {
      const encoder = new TextEncoder();
      const data = encoder.encode(pwd);
      const hash = await crypto.subtle.digest('SHA-256', data);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function loginAdmin() {
      const input = document.getElementById("adminPwdInput").value;
      if (!input) return;
      savedPassword = await hashPassword(input);
      await initApp();
  }

  async function setAdminPassword() {
      const input = document.getElementById("adminPwdInput").value;
      if (!input) {
          alert("Password cannot be empty");
          return;
      }
      const hashed = await hashPassword(input);
      try {
          await fetch(API_BASE_URL + "/api/admin-password", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ password: hashed })
          });
          savedPassword = hashed;
          await initApp();
      } catch(e) {
          console.error(e);
      }
  }

  async function apiFetch(url, options = {}) {
    const headers = { 'Content-Type': 'application/json' };
    if (savedPassword) headers['x-admin-password'] = savedPassword;
    const res = await fetch(API_BASE_URL + url, { cache: 'no-store', ...options, headers });
    if (res.status === 401) {
        localStorage.removeItem("adminPassword");
        document.getElementById('authOverlay').style.display = 'flex';
        document.getElementById('appContainer').style.display = 'none';
        throw new Error("Unauthorized");
    }
    return res;
  }

  let appInitialized = false;
  async function initApp() {
      try {
          const hasPwdRes = await fetch(API_BASE_URL + '/api/has-admin-password');
          const { hasPassword } = await hasPwdRes.json();
          
          if (!hasPassword) {
              document.getElementById('authTitle').textContent = "Set Admin Password";
              document.getElementById('authBtn').textContent = "SET PASSWORD";
              document.getElementById('authBtn').onclick = setAdminPassword;
              document.getElementById('adminPwdInput').onkeypress = (e) => { if(e.key === 'Enter') setAdminPassword(); };
              document.getElementById('authOverlay').style.display = 'flex';
              document.getElementById('appContainer').style.display = 'none';
              return;
          }

          document.getElementById('authTitle').textContent = "Admin Login";
          document.getElementById('authBtn').textContent = "LOGIN";
          document.getElementById('authBtn').onclick = loginAdmin;
          document.getElementById('adminPwdInput').onkeypress = (e) => { if(e.key === 'Enter') loginAdmin(); };

          await apiFetch('/api/state'); // test auth
          localStorage.setItem("adminPassword", savedPassword);
          document.getElementById('authOverlay').style.display = 'none';
          document.getElementById('appContainer').style.display = 'flex';
          
          if (!appInitialized) {
              appInitialized = true;
              updateTimerDisplay();
              fetchState();
              setInterval(fetchState, 3000);
          }
      } catch(e) {
          console.error("Login failed or unauthorized");
      }
  }

  async function fetchState() {
    try {
      const res = await apiFetch('/api/state');
      const data = await res.json();
      teamsData = data.teams;
      if (data.timer) {
        serverTimer = data.timer;
        updateTimerDisplay();
      }
      renderTeams();
    } catch (err) {
      console.error(err);
    }
  }

  async function addScore(teamId, delta) {
    if (delta > 0) {
      if (window.AudioFX) window.AudioFX.playCoin();
    } else {
      if (window.AudioFX) window.AudioFX.playHurt();
    }
    try {
      const res = await apiFetch('/api/score', {
        method: 'POST',
        body: JSON.stringify({ teamId, delta })
      });
      if (res.ok) {
        const data = await res.json();
        if (teamsData[teamId]) {
          teamsData[teamId].score = data.score;
        }
        renderTeams();
        checkWinner();
      }
    } catch (err) {
      console.error(err);
      alert('Failed to update score');
    }
  }

  async function resetScores() {
    if (!confirm('Are you sure you want to reset all scores to 0?')) return;
    try {
      const res = await apiFetch('/api/reset_scores', { method: 'POST' });
      if (res.ok) {
        fetchState();
      } else {
        alert('Failed to reset scores');
      }
    } catch (err) {
      console.error(err);
      alert('Failed to reset scores');
    }
  }

  function renderTeams() {
    const grid = document.getElementById('teamsGrid');
    grid.innerHTML = '';

    Object.keys(teamsData).forEach(id => {
      const team = teamsData[id];
      const card = document.createElement('div');
      card.className = 'team-card';
      
      card.innerHTML = `
        <div class="team-card-header" style="align-items: center; justify-content: center; margin-bottom: 1.5rem;">
          <h3 style="margin: 0; font-size: 1.2rem; text-align: center;">${team.name.replace(/</g, "&lt;")}</h3>
        </div>
        
        <div style="font-size: 3rem; text-align: center; margin-bottom: 2rem; color: var(--primary);">
          ${team.score || 0}
        </div>
        
        <div style="display: flex; gap: 0.5rem; justify-content: center;">
          <button class="btn" style="background: #10B981; color: white; padding: 0.5rem;" onclick="addScore('${id}', 1)">+1</button>
          <button class="btn" style="background: #3B82F6; color: white; padding: 0.5rem;" onclick="addScore('${id}', 2)">+2</button>
          <button class="btn" style="background: #8B5CF6; color: white; padding: 0.5rem;" onclick="addScore('${id}', 3)">+3</button>
          <button class="btn" style="background: #EF4444; color: white; padding: 0.5rem;" onclick="addScore('${id}', -1)">-1</button>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  // Initial load
  initApp();
</script>

<script src="sounds.js"></script>
</body>
</html>
