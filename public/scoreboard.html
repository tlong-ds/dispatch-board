<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scoreboard - Item Dispatch</title>
  <style>
    @font-face {
      font-family: 'PressStart2P';
      src: url('./PressStart2P-Regular.ttf') format('truetype');
    }
    :root {
      --bg: #F7F7F7;
      --text: #535454;
      --primary: #535454;
      --success: #535454;
    }
    body {
      margin: 0;
      font-family: 'PressStart2P', system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    header {
      padding: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }
    h1 {
      margin: 0;
      font-size: 1.5rem;
      text-transform: uppercase;
      line-height: 1.5;
    }
    .btn {
      color: var(--bg);
      background-color: var(--text);
      border: 4px solid var(--text);
      padding: 1rem 1.5rem;
      cursor: pointer;
      font-family: 'PressStart2P', system-ui, sans-serif;
      font-size: 0.8rem;
      transition: transform 0.1s;
    }
    .btn:active {
      transform: translateY(4px);
    }
    .btn-sm {
      padding: 0.8rem 1rem;
      font-size: 0.6rem;
    }
    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
      z-index: 10;
      padding-bottom: 80px;
      gap: 1.5rem;
      padding-left: 1.5rem;
      padding-right: 1.5rem;
    }
    .items-panel, .teams-panel {
      flex: 1;
      overflow-y: auto;
    }
    .items-panel {
      display: flex;
      flex-direction: column;
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    h2 {
      margin: 0;
      font-size: 1rem;
      color: var(--text);
    }
    select {
      background: #fff;
      color: var(--text);
      border: 2px solid var(--text);
      padding: 0.5rem;
      font-family: 'PressStart2P', system-ui, sans-serif;
      font-size: 0.6rem;
      cursor: pointer;
    }
    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      padding-bottom: 2rem;
    }
    .team-card {
      background: white;
      border: 4px solid var(--text);
      box-shadow: 6px 6px 0px var(--text);
      padding: 1.5rem;
      position: relative;
      min-height: 150px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .team-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.5rem;
      flex-direction: column;
      gap: 0.5rem;
    }
    .team-name-input {
      background: transparent;
      color: var(--text);
      border: none;
      font-size: 0.8rem;
      width: 100%;
      font-family: 'PressStart2P', system-ui, sans-serif;
      padding: 0.2rem;
    }
    .team-name-input:focus {
      outline: none;
      border-bottom: 2px dashed var(--text);
    }
    .team-status {
      color: var(--text);
      font-size: 0.6rem;
      opacity: 0.7;
    }
    .team-item-display {
      margin-top: 1rem;
      font-size: 1rem;
      color: var(--text);
      height: 3.5rem;
      line-height: 1.5;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      word-break: break-word;
    }
    .team-controls {
      display: flex;
      gap: 0.5rem;
    }
    #bulkItemsTextarea {
      flex: 1;
      width: 100%;
      background: white;
      color: var(--text);
      border: 4px solid var(--text);
      box-shadow: 6px 6px 0px var(--text);
      padding: 1.5rem;
      font-family: 'PressStart2P', system-ui, sans-serif;
      font-size: 0.8rem;
      line-height: 1.8;
      resize: none;
      box-sizing: border-box;
    }
    #bulkItemsTextarea:focus {
      outline: none;
    }

    /* Decorative Background */
    .bg-road {
      position: absolute;
      bottom: 40px;
      left: 0;
      width: 200%;
      height: 20px;
      background: url('./extracted_assets/media/image12.svg') repeat-x bottom center / auto 20px;
      z-index: 0;
    }
    .bg-road::before {
      content: "";
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      height: 40px;
      background: url('./extracted_assets/media/image6.svg') repeat-x top center / auto 40px;
    }

    .bg-dino {
      position: absolute;
      bottom: 35px;
      left: 50px;
      width: 110px;
      height: 117px;
      background: url('./extracted_assets/media/image2.svg') no-repeat center center / contain;
      z-index: 9999;
    }
    .bg-cactus-small {
      position: absolute;
      bottom: 35px;
      width: 50px;
      height: 75px;
      background: url('./extracted_assets/media/image8.svg') no-repeat center center / contain;
      z-index: 9999;
    }
    .bg-cactus-large {
      position: absolute;
      bottom: 35px;
      width: 85px;
      height: 125px;
      background: url('./extracted_assets/media/image7.png') no-repeat center bottom / contain;
      z-index: 9999;
    }
    .cloud-cluster-1 {
      position: absolute;
      top: 40px;
      width: 250px;
      height: 100px;
      animation: float 40s linear infinite;
      z-index: 0;
    }
    .cloud-cluster-2 {
      position: absolute;
      top: 70px;
      width: 300px;
      height: 120px;
      animation: float 55s linear infinite 20s;
      z-index: 0;
    }
    .cloud-cluster-3 {
      position: absolute;
      top: 20px;
      width: 200px;
      height: 90px;
      animation: float 30s linear infinite 10s;
      z-index: 0;
    }
    .cloud-part-1 {
      position: absolute;
      top: 15px;
      left: 0;
      width: 100px;
      height: 60px;
      background: url('./extracted_assets/media/image3.svg') no-repeat center center / contain;
      opacity: 0.8;
    }
    .cloud-part-2 {
      position: absolute;
      top: 0;
      left: 60px;
      width: 140px;
      height: 80px;
      background: url('./extracted_assets/media/image4.svg') no-repeat center center / contain;
      opacity: 0.6;
    }
    .cloud-part-3 {
      position: absolute;
      top: 25px;
      left: 150px;
      width: 90px;
      height: 50px;
      background: url('./extracted_assets/media/image3.svg') no-repeat center center / contain;
      opacity: 0.9;
    }
    @keyframes float {
      from { transform: translateX(100vw); }
      to { transform: translateX(-100vw); }
    }
  </style>
</head>
<body>

<div class="cloud-cluster-1" style="transform: translateX(100vw);">
  <div class="cloud-part-1"></div>
  <div class="cloud-part-2"></div>
  <div class="cloud-part-3"></div>
</div>
<div class="cloud-cluster-2" style="transform: translateX(100vw);">
  <div class="cloud-part-2" style="left: 0; top: 10px;"></div>
  <div class="cloud-part-1" style="left: 100px; top: 0;"></div>
</div>
<div class="cloud-cluster-3" style="transform: translateX(100vw);">
  <div class="cloud-part-3" style="left: 0; top: 10px;"></div>
  <div class="cloud-part-1" style="left: 50px; top: 0;"></div>
  <div class="cloud-part-2" style="left: 110px; top: 15px;"></div>
</div>
<div class="bg-dino" id="dino"></div>
<div class="bg-cactus-small" style="left: calc(50% + 300px);"></div>
<div class="bg-cactus-large" style="left: calc(50% + 340px);"></div>
<div class="bg-cactus-small" style="left: calc(50% + 420px);"></div>
<div class="bg-cactus-large" style="left: calc(50% + 460px);"></div>
<div class="bg-road"></div>

<header>
  <h1>Dispatch Scoreboard</h1>
  <div>
    <button class="btn btn-primary" onclick="window.close()">BACK</button>
  </div>
</header>

<div class="container">
  
  <div style="background: white; border: 4px solid var(--text); padding: 1.5rem; margin-bottom: 2rem; display: flex; flex-direction: column; align-items: center; box-shadow: 6px 6px 0px var(--text); z-index: 10; position: relative;">
    <h2 style="margin: 0 0 1rem 0;">COUNTDOWN</h2>
    <div id="timerDisplay" style="font-size: 3rem; margin-bottom: 1rem;">05:00</div>
    <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
      <button class="btn" style="background: var(--primary); color: white;" onclick="startTimer()">START</button>
      <button class="btn" style="background: #FBBF24; color: black;" onclick="pauseTimer()">PAUSE</button>
      <button class="btn" style="background: var(--danger); color: white;" onclick="resetTimer()">RESET</button>
    </div>
    
    <div style="display: flex; align-items: center; gap: 1rem; border-top: 2px dashed #ccc; padding-top: 1rem; width: 100%; justify-content: center;">
      <label style="font-size: 1rem;">SCORE TO WIN:</label>
      <input type="number" id="winThreshold" value="10" style="width: 80px; text-align: center; font-size: 1.2rem; padding: 0.5rem; border: 2px solid var(--text); font-family: 'PressStart2P', system-ui, sans-serif;">
    </div>
  </div>

  <div id="teamsGrid" class="team-grid">
    <!-- Teams will be populated here -->
  </div>
</div>

<!-- Graffiti Modal -->
<div id="graffitiModal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; flex-direction: column;">
  <div id="winnerName" style="font-size: 4rem; color: #FF0055; text-shadow: 4px 4px 0 #00FFCC, -2px -2px 0 #FFEB3B, 0 0 20px #FF0055; transform: rotate(-5deg); margin-bottom: 2rem; text-align: center; line-height: 1.2;">
    TEAM WINS!
  </div>
  <button class="btn btn-primary" onclick="closeModal()">CONTINUE</button>
</div>

<script>
  let teamsData = {};
  
  // Timer State
  let timerInterval;
  let timeLeft = 300; // 5 minutes default
  let timerRunning = false;

  function updateTimerDisplay() {
    const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
    const s = (timeLeft % 60).toString().padStart(2, '0');
    document.getElementById('timerDisplay').innerText = `${m}:${s}`;
  }

  function startTimer() {
    if (timerRunning) return;
    timerRunning = true;
    timerInterval = setInterval(() => {
      if (timeLeft > 0) {
        timeLeft--;
        updateTimerDisplay();
      } else {
        pauseTimer();
      }
    }, 1000);
  }

  function pauseTimer() {
    timerRunning = false;
    clearInterval(timerInterval);
  }

  function resetTimer() {
    pauseTimer();
    timeLeft = 300;
    updateTimerDisplay();
  }

  function closeModal() {
    document.getElementById('graffitiModal').style.display = 'none';
  }

  function checkWinner() {
    const threshold = parseInt(document.getElementById('winThreshold').value, 10);
    for (const id in teamsData) {
      if (teamsData[id].score >= threshold) {
        document.getElementById('winnerName').innerText = `${teamsData[id].name}
WINS!`;
        document.getElementById('graffitiModal').style.display = 'flex';
        break; // Only show one winner at a time
      }
    }
  }

  const API_BASE_URL = '__API_BASE_URL__'.startsWith('__') ? 'http://localhost:3000' : '__API_BASE_URL__'; // Replaced by GitHub Actions

  async function apiFetch(url, options = {}) {
    const password = localStorage.getItem('adminPassword') || '';
    const headers = { 'Content-Type': 'application/json' };
    if (password) headers['x-admin-password'] = password;
    return fetch(API_BASE_URL + url, { ...options, headers });
  }

  async function fetchState() {
    try {
      const res = await apiFetch('/api/state');
      if (res.status === 401) {
        const pwd = prompt('Admin Password required:');
        if (pwd !== null) {
          localStorage.setItem('adminPassword', pwd);
          return fetchState();
        }
        return;
      }
      const data = await res.json();
      teamsData = data.teams;
      renderTeams();
    } catch (err) {
      console.error(err);
    }
  }

  async function addScore(teamId, delta) {
    try {
      const res = await apiFetch('/api/score', {
        method: 'POST',
        body: JSON.stringify({ teamId, delta })
      });
      if (res.ok) {
        const data = await res.json();
        if (teamsData[teamId]) {
          teamsData[teamId].score = data.score;
        }
        renderTeams();
        checkWinner();
      }
    } catch (err) {
      console.error(err);
      alert('Failed to update score');
    }
  }

  function renderTeams() {
    const grid = document.getElementById('teamsGrid');
    grid.innerHTML = '';

    Object.keys(teamsData).forEach(id => {
      const team = teamsData[id];
      const card = document.createElement('div');
      card.className = 'team-card';
      
      card.innerHTML = `
        <div class="team-card-header" style="align-items: center; justify-content: center; margin-bottom: 1.5rem;">
          <h3 style="margin: 0; font-size: 1.2rem; text-align: center;">${team.name.replace(/</g, "&lt;")}</h3>
        </div>
        
        <div style="font-size: 3rem; text-align: center; margin-bottom: 2rem; color: var(--primary);">
          ${team.score || 0}
        </div>
        
        <div style="display: flex; gap: 0.5rem; justify-content: center;">
          <button class="btn" style="background: #10B981; color: white; padding: 0.5rem;" onclick="addScore('${id}', 1)">+1</button>
          <button class="btn" style="background: #3B82F6; color: white; padding: 0.5rem;" onclick="addScore('${id}', 2)">+2</button>
          <button class="btn" style="background: #8B5CF6; color: white; padding: 0.5rem;" onclick="addScore('${id}', 3)">+3</button>
          <button class="btn" style="background: #EF4444; color: white; padding: 0.5rem;" onclick="addScore('${id}', -1)">-1</button>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  // Poll state every 3 seconds to catch resets or score changes from other clients
  setInterval(fetchState, 3000);

  // Initial load
  updateTimerDisplay();
  fetchState();
</script>

</body>
</html>
