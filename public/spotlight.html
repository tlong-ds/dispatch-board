<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spotlight - Projector</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @font-face {
      font-family: 'PressStart2P';
      src: url('./PressStart2P-Regular.ttf') format('truetype');
    }
    :root {
      --bg: #111111;
      --text: #ffffff;
      --primary: #ffd700;
    }
    body {
      margin: 0;
      font-family: 'PressStart2P', system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
      position: relative;
    }
    
    /* Spotlight Effect */
    .spotlight {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at 50% 30%, transparent 10%, rgba(0, 0, 0, 0.8) 60%, rgba(0, 0, 0, 0.95) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .container {
      padding: 4rem;
      z-index: 10;
      position: relative;
      max-width: 80vw;
    }

    .prompt-text {
      font-size: 3rem;
      line-height: 1.5;
      color: var(--primary);
      text-shadow: 4px 4px 0px rgba(0,0,0,0.5);
      min-height: 150px;
    }

    .feedback-container {
      margin-top: 2rem;
      max-height: 40vh;
      overflow-y: auto;
      width: 100%;
      text-align: left;
    }

    .feedback-item {
      background: rgba(255, 255, 255, 0.1);
      border-left: 4px solid var(--primary);
      padding: 1rem;
      margin-bottom: 1rem;
      font-size: 1.2rem;
      line-height: 1.5;
    }
    
    .feedback-item .from-team {
      font-weight: bold;
      color: var(--primary);
      margin-bottom: 0.5rem;
      font-size: 1.4rem;
    }
    
    .status-text {
      font-size: 1.5rem;
      color: #aaaaaa;
      margin-bottom: 2rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Decorative Background */
    .bg-road {
      position: absolute;
      bottom: 40px;
      left: 0;
      width: 200%;
      height: 20px;
      background: url('./extracted_assets/media/image12.svg') repeat-x bottom center / auto 20px;
      z-index: 0;
      opacity: 0.3;
    }
    .bg-road::before {
      content: "";
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      height: 40px;
      background: url('./extracted_assets/media/image6.svg') repeat-x top center / auto 40px;
    }
    .bg-dino {
      position: absolute;
      bottom: 35px;
      left: calc(50% - 55px);
      width: 110px;
      height: 117px;
      background: url('./extracted_assets/media/image2.svg') no-repeat center center / contain;
      z-index: 2;
      filter: brightness(0) invert(1);
    }

  </style>
</head>
<body>

<div class="spotlight"></div>
<div class="bg-road"></div>
<div class="bg-dino"></div>

<div class="container">
  <div class="status-text" id="statusText">WAITING FOR PROMPT</div>
  <div class="prompt-text" id="promptText">...</div>
  <div class="feedback-container" id="feedbackContainer" style="display: none;"></div>
</div>

<script>
  const API_BASE_URL = window.location.origin;

  async function fetchState() {
    try {
      const res = await fetch(API_BASE_URL + "/api/spotlight/state");
      if (res.ok) {
        const state = await res.json();
        updateUI(state);
      }
    } catch (err) {
      console.error(err);
    }
  }

  function updateUI(state) {
    const promptText = document.getElementById('promptText');
    const statusText = document.getElementById('statusText');
    const feedbackContainer = document.getElementById('feedbackContainer');

    if (state.spotlightedTeamId && state.spotlightedTeamName) {
      statusText.textContent = `SPOTLIGHT: ${state.spotlightedTeamName}`;
      statusText.style.color = "var(--primary)";
      
      // Render Feedback
      feedbackContainer.style.display = "block";
      const feedbacks = state.feedbacks || [];
      if (feedbacks.length > 0) {
        feedbackContainer.innerHTML = feedbacks.map(f => `
          <div class="feedback-item">
            <div class="from-team">${f.fromTeamName} said:</div>
            <div><span style="color:#aaa;">Hesitated >3s:</span> ${f.fluency ? 'Yes' : 'No'}</div>
            <div><span style="color:#aaa;">Structure:</span> ${f.structure || 'None'}</div>
            <div><span style="color:#aaa;">All 3 starters:</span> ${f.completion ? 'Yes' : 'No'}</div>
            <div><span style="color:#aaa;">Vocab:</span> ${f.vocabulary || '-'}</div>
          </div>
        `).join("");
      } else {
        feedbackContainer.innerHTML = '<div style="color: #aaaaaa; font-size: 1.5rem; margin-top: 2rem;">Waiting for live feedback...</div>';
      }
    } else {
      feedbackContainer.style.display = "none";
      if (state.currentPrompt) {
        statusText.textContent = "TODAY'S TOPIC";
        statusText.style.color = "var(--text)";
      } else {
        statusText.textContent = "WAITING FOR PROMPT";
        statusText.style.color = "#aaaaaa";
      }
    }
    
    if (state.currentPrompt) {
        promptText.textContent = state.currentPrompt;
    } else {
        promptText.textContent = "...";
    }
  }

  setInterval(fetchState, 1000);
  fetchState();
</script>

</body>
</html>
