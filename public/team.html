<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Team View - Item Dispatch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @font-face {
      font-family: 'PressStart2P';
      src: url('./PressStart2P-Regular.ttf') format('truetype'),
           url('PressStart2P-Regular.ttf') format('truetype'),
           url('../PressStart2P-Regular.ttf') format('truetype'),
           url('/PressStart2P-Regular.ttf') format('truetype');
    }
    :root {
      --bg: #F7F7F7;
      --text: #535454;
      --accent: #535454;
    }
    body {
      margin: 0;
      font-family: 'PressStart2P', system-ui, sans-serif;
      background-color: transparent;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
      position: relative;
    }
    body.has-item {
      background-color: #E2E8F0;
    }
    .container {
      padding: 2rem;
      z-index: 10;
      position: relative;
    }
    .status {
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 1rem;
      animation: pulse 2s infinite;
      line-height: 1.5;
    }
    .item-display {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--text);
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s, transform 0.5s;
      word-break: break-word;
      background: white;
      border: 4px solid var(--text);
      box-shadow: 6px 6px 0px var(--text);
      padding: 2rem;
      display: inline-block;
      min-width: 300px;
      white-space: pre-wrap;
      text-align: left;
      line-height: 1.5;
    }
    .feedback-container {
      display: none;
      flex-direction: column;
      gap: 1rem;
      background: white;
      border: 4px solid var(--text);
      box-shadow: 6px 6px 0px var(--text);
      padding: 2rem;
      width: 90%;
      max-width: 500px;
      text-align: left;
      z-index: 20;
    }
    .feedback-container.active {
      display: flex;
    }
    .feedback-container h2 {
      margin-top: 0;
      font-size: 1.2rem;
      text-align: center;
    }
    .feedback-field {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      font-size: 0.6rem;
      line-height: 1.5;
    }
    .feedback-field label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
    }
    .feedback-field input[type="text"] {
      padding: 0.5rem;
      font-family: 'PressStart2P', system-ui, sans-serif;
      font-size: 0.6rem;
      border: 2px solid var(--text);
    }
    .btn {
      background: var(--text);
      color: var(--bg);
      border: 2px solid var(--text);
      padding: 1rem;
      font-family: 'PressStart2P', system-ui, sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      margin-top: 1rem;
    }
    body.has-item .status {
      display: none;
    }
    body.has-item .item-display {
      opacity: 1;
      transform: translateY(0);
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .team-badge {
      position: absolute;
      top: 2rem;
      left: 2rem;
      background-color: var(--text);
      color: var(--bg);
      border: 4px solid var(--text);
      padding: 1rem 1.5rem;
      font-weight: 600;
      font-size: 0.8rem;
      z-index: 10;
    }

    /* Decorative Background */
    .bg-road {
      position: absolute;
      bottom: 40px;
      left: 0;
      width: 200%;
      height: 20px;
      background: url('./extracted_assets/media/image12.svg') repeat-x bottom center / auto 20px;
      z-index: 0;
    }
    .bg-road::before {
      content: "";
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      height: 40px;
      background: url('./extracted_assets/media/image6.svg') repeat-x top center / auto 40px;
    }

    .bg-dino {
      position: absolute;
      bottom: 35px;
      left: 50px;
      width: 110px;
      height: 117px;
      background: url('./extracted_assets/media/image2.svg') no-repeat center center / contain;
      z-index: 9999;
    }
    .bg-dino.jumping {
      animation: jump 0.5s ease-out;
    }
    @keyframes jump {
      0% { bottom: 35px; }
      50% { bottom: 135px; }
      100% { bottom: 35px; }
    }
    .bg-cactus-small {
      position: absolute;
      bottom: 35px;
      left: calc(50% + 250px);
      width: 50px;
      height: 75px;
      background: url('./extracted_assets/media/image8.svg') no-repeat center center / contain;
      z-index: 9999;
    }
    .bg-cactus-large {
      position: absolute;
      bottom: 35px;
      left: calc(50% + 275px);
      width: 85px;
      height: 125px;
      background: url('./extracted_assets/media/image7.png') no-repeat center bottom / contain;
      z-index: 9999;
    }
    .cloud-cluster-1 {
      position: absolute;
      top: 40px;
      width: 250px;
      height: 100px;
      animation: float 40s linear infinite;
      z-index: 0;
    }
    .cloud-cluster-2 {
      position: absolute;
      top: 70px;
      width: 300px;
      height: 120px;
      animation: float 55s linear infinite 20s;
      z-index: 0;
    }
    .cloud-cluster-3 {
      position: absolute;
      top: 20px;
      width: 200px;
      height: 90px;
      animation: float 30s linear infinite 10s;
      z-index: 0;
    }
    .cloud-part-1 {
      position: absolute;
      top: 15px;
      left: 0;
      width: 100px;
      height: 60px;
      background: url('./extracted_assets/media/image3.svg') no-repeat center center / contain;
      opacity: 0.8;
    }
    .cloud-part-2 {
      position: absolute;
      top: 0;
      left: 60px;
      width: 140px;
      height: 80px;
      background: url('./extracted_assets/media/image4.svg') no-repeat center center / contain;
      opacity: 0.6;
    }
    .cloud-part-3 {
      position: absolute;
      top: 25px;
      left: 150px;
      width: 90px;
      height: 50px;
      background: url('./extracted_assets/media/image3.svg') no-repeat center center / contain;
      opacity: 0.9;
    }
    @keyframes float {
      from { transform: translateX(100vw); }
      to { transform: translateX(-100vw); }
    }
  </style>
</head>
<body>

<div class="cloud-cluster-1" style="transform: translateX(100vw);">
  <div class="cloud-part-1"></div>
  <div class="cloud-part-2"></div>
  <div class="cloud-part-3"></div>
</div>
<div class="cloud-cluster-2" style="transform: translateX(100vw);">
  <div class="cloud-part-2" style="left: 0; top: 10px;"></div>
  <div class="cloud-part-1" style="left: 100px; top: 0;"></div>
</div>
<div class="cloud-cluster-3" style="transform: translateX(100vw);">
  <div class="cloud-part-3" style="left: 0; top: 10px;"></div>
  <div class="cloud-part-1" style="left: 50px; top: 0;"></div>
  <div class="cloud-part-2" style="left: 110px; top: 15px;"></div>
</div>
<div class="bg-dino" id="dino"></div>
<div class="bg-cactus-small" style="left: calc(50% + 300px);"></div>
<div class="bg-cactus-large" style="left: calc(50% + 340px);"></div>
<div class="bg-cactus-small" style="left: calc(50% + 420px);"></div>
<div class="bg-cactus-large" style="left: calc(50% + 460px);"></div>
<div class="bg-road"></div>

<div class="team-badge" id="teamBadge">Loading Team...</div>

<div class="container" id="mainContainer">
  <div class="status" id="status">Waiting for your item...</div>
  <div id="contentContainer"></div>
</div>

<div class="feedback-container" id="feedbackContainer">
  <h2>Peer Audit</h2>
  <div class="feedback-field">
    <label><input type="checkbox" id="fbFluency"> Speaker hesitated for >3s</label>
  </div>
  <div class="feedback-field">
    <span>Structure Guessed:</span>
    <label><input type="radio" name="fbStructure" value="Why/What"> Why & What Happens</label>
    <label><input type="radio" name="fbStructure" value="Yes/But"> Yes, But...</label>
    <label><input type="radio" name="fbStructure" value="Future Guess"> Future Guess</label>
    <label><input type="radio" name="fbStructure" value="None"> Unsure</label>
  </div>
  <div class="feedback-field">
    <label><input type="checkbox" id="fbCompletion"> Used all 3 sentence starters</label>
  </div>
  <div class="feedback-field">
    <span>Advanced Vocab Used:</span>
    <input type="text" id="fbVocab" placeholder="Type a word/phrase...">
  </div>
  <button class="btn" onclick="submitFeedback()">Submit Feedback</button>
  <div id="fbThanks" style="display:none; text-align:center; color: #4ade80; font-size: 0.8rem; margin-top: 1rem;">Submitted!</div>
</div>

<script>
  const API_BASE_URL = '__API_BASE_URL__'.startsWith('__') ? 'http://localhost:3000' : '__API_BASE_URL__'; // Replaced by GitHub Actions

  const urlParams = new URLSearchParams(window.location.search);
  let searchId = urlParams.get('id');
  
  // Fallback for old path-based links if any
  if (!searchId) {
    const pathParts = window.location.pathname.split('/');
    searchId = pathParts[pathParts.length - 1];
    if (searchId === 'team' || searchId === 'team.html') searchId = null;
  }

  if (!searchId) {
    document.getElementById('status').textContent = "Error: No Team ID found in URL";
    document.getElementById('status').style.animation = 'none';
    document.getElementById('teamBadge').style.display = 'none';
  }

  let currentItem = null;
  let currentTeamId = null;
  let spotlightState = null;
  let feedbackSubmittedFor = null;

  async function pollItem() {
    if (!searchId) return;
    
    try {
      const [teamRes, spotlightRes] = await Promise.all([
         fetch(API_BASE_URL + `/api/team/${searchId}`),
         fetch(API_BASE_URL + `/api/spotlight/state`)
      ]);
      
      if (spotlightRes.ok) spotlightState = await spotlightRes.json();
      
      if (teamRes.ok) {
        const data = await teamRes.json();
        
        if (data.name) {
          document.getElementById('teamBadge').textContent = data.name;
        }
        currentTeamId = data._id;

        if (data.item !== currentItem) {
          currentItem = data.item;
          updateUI(true); // Item changed
        } else {
          updateUI(false); // Maybe spotlight changed
        }
      }
    } catch (err) {
      console.error("Polling error:", err);
    }
  }

  function updateUI(itemChanged) {
    const itemDisplay = document.getElementById('itemDisplay');
    const mainContainer = document.getElementById('mainContainer');
    const feedbackContainer = document.getElementById('feedbackContainer');
    const dino = document.getElementById('dino');
    const status = document.getElementById('status');
    
    // Check spotlight state first
    if (spotlightState && spotlightState.spotlightedTeamId) {
      if (spotlightState.spotlightedTeamId !== currentTeamId) {
        // We are NOT the spotlighted team. Show feedback form.
        mainContainer.style.display = 'none';
        feedbackContainer.classList.add('active');
        document.body.style.backgroundColor = '#E2E8F0';
        
        // Reset feedback form if it's a new spotlight
        if (feedbackSubmittedFor !== spotlightState.spotlightedTeamId) {
          document.getElementById('fbFluency').checked = false;
          document.querySelectorAll('input[name="fbStructure"]').forEach(r => r.checked = false);
          document.getElementById('fbCompletion').checked = false;
          document.getElementById('fbVocab').value = '';
          document.getElementById('fbThanks').style.display = 'none';
        }
        return;
      }
    }
    
    // We are either the spotlighted team, or no spotlight is active. Show normal view.
    mainContainer.style.display = 'block';
    feedbackContainer.classList.remove('active');
    
    if (spotlightState && spotlightState.spotlightedTeamId === currentTeamId) {
        document.body.style.backgroundColor = '#fde047'; // Highlight background for spotlighted team
    } else if (currentItem) {
        document.body.style.backgroundColor = '#E2E8F0';
    } else {
        document.body.style.backgroundColor = 'transparent';
    }

    let itemChanged = false;
    if (teamData && teamData.item !== currentItem) {
      currentItem = teamData.item;
      itemChanged = true;
    }

    const isSpotlighted = spotlightState && spotlightState.spotlightedTeamId === currentTeamId;

    if (isSpotlighted) {
      renderDecks();
      document.body.classList.add('has-item');
      status.textContent = "SPOTLIGHTED! Choose your deck:";
      status.style.color = "var(--primary)";
    } else if (currentItem) {
      renderItem();
      document.body.classList.add('has-item');
      status.textContent = "You received an item!";
      status.style.color = "var(--text)";
    } else {
      document.getElementById('contentContainer').innerHTML = '';
      document.body.classList.remove('has-item');
      status.textContent = "Waiting for your turn...";
      status.style.color = "var(--text)";
    }

    if (itemChanged && !isSpotlighted) {
        isExpanded = false;
        if (navigator.vibrate) navigator.vibrate(200);
        if (dino) {
          dino.classList.remove('jumping');
          void dino.offsetWidth;
          dino.classList.add('jumping');
          if (window.AudioFX) window.AudioFX.playJump();
        }
    }
  }

  let isExpanded = false;
  function toggleExpand() {
      if (!currentItem || !currentItem.includes('\n')) return;
      isExpanded = !isExpanded;
      renderItem();
  }

  let expandedDeckIndex = -1;
  function toggleDeck(index) {
      expandedDeckIndex = expandedDeckIndex === index ? -1 : index;
      renderDecks();
  }

  function renderDecks() {
      const container = document.getElementById('contentContainer');
      const DECKS = [
          "1. THE REASON: \"I think the primary reason for this is...\"\n2. THE DAILY EFFECT: \"Because of this, ...\"\n3. THE BIG PICTURE: \"As a result, society as a whole will ultimately...\"",
          "1. YOUR VIEW: \"I strongly believe that...\"\n2. THE OTHER SIDE: \"Admittedly, it is true that some people might argue...\"\n3. YOUR COMEBACK: \"However, at the end of the day...\"",
          "1. THE FUTURE: \"In the coming years, it is highly likely that...\"\n2. THE 'WHAT IF': \"If this trend continues, then we will probably see...\"\n3. THE WARNING: \"The only major risk with this is...\""
      ];
      
      let html = `<div style="display: flex; flex-direction: column; gap: 1rem; width: 100%; max-width: 400px; margin: 0 auto;">`;
      
      DECKS.forEach((deckText, index) => {
          const lines = deckText.split('\n');
          const title = lines[0].match(/1\.\s(.*?):/) ? lines[0].match(/1\.\s(.*?):/)[1] : 'DECK';
          const isExpanded = (expandedDeckIndex === index);
          
          html += `
              <div class="item-display" style="cursor: pointer; padding: 1.5rem; margin: 0; min-width: auto; width: 100%; box-sizing: border-box; display: block;" onclick="toggleDeck(${index})">
                  ${!isExpanded ? `
                  <div style="text-align: center;">
                      <div style="font-size: 0.7rem; color: #888; margin-bottom: 0.5rem; animation: pulse 2s infinite;">TAP TO OPEN</div>
                      <div style="font-size: 1.2rem; color: var(--primary); text-transform: uppercase;">${title}</div>
                  </div>
                  ` : `
                  <div style="cursor: pointer;">
                      <div style="font-size: 0.7rem; color: #888; margin-bottom: 1rem; text-align: center; animation: pulse 2s infinite;">TAP TO CLOSE</div>
                      <div style="white-space: pre-wrap; font-size: 0.9rem; line-height: 2; text-align: left; color: var(--text);">${deckText}</div>
                  </div>
                  `}
              </div>
          `;
      });
      html += `</div>`;
      container.innerHTML = html;
  }

  function renderItem() {
      const container = document.getElementById('contentContainer');
      if (!currentItem) {
          container.innerHTML = '';
          return;
      }
      
      if (currentItem.includes('\n')) {
          const lines = currentItem.split('\n');
          const match = lines[0].match(/1\.\s(.*?):/);
          const title = match ? match[1] : 'DECK';
          
          container.innerHTML = `
            <div class="item-display" style="cursor: pointer; display: inline-block;" onclick="toggleExpand()">
                ${!isExpanded ? `
                <div style="text-align: center;">
                    <div style="font-size: 0.8rem; color: #888; margin-bottom: 0.5rem; animation: pulse 2s infinite;">TAP TO OPEN</div>
                    <div style="font-size: 1.5rem; color: var(--text); text-transform: uppercase;">${title}</div>
                </div>
                ` : `
                <div>
                    <div style="font-size: 0.8rem; color: #888; margin-bottom: 1rem; text-align: center; animation: pulse 2s infinite;">TAP TO CLOSE</div>
                    <div style="white-space: pre-wrap; font-size: 1rem; line-height: 2; text-align: left;">${currentItem}</div>
                </div>
                `}
            </div>
          `;
      } else {
          container.innerHTML = `<div class="item-display" style="display: inline-block; cursor: default;">${currentItem}</div>`;
      }
  }

  async function submitFeedback() {
    if (!currentTeamId || !spotlightState || !spotlightState.spotlightedTeamId) return;
    
    const fluency = document.getElementById('fbFluency').checked;
    const structureEl = document.querySelector('input[name="fbStructure"]:checked');
    const structure = structureEl ? structureEl.value : null;
    const completion = document.getElementById('fbCompletion').checked;
    const vocabulary = document.getElementById('fbVocab').value.trim();
    
    try {
      await fetch(API_BASE_URL + '/api/spotlight/feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          teamId: currentTeamId,
          fluency,
          structure,
          completion,
          vocabulary
        })
      });
      feedbackSubmittedFor = spotlightState.spotlightedTeamId;
      document.getElementById('fbThanks').style.display = 'block';
    } catch (err) {
      console.error(err);
    }
  }

  if (searchId) {
    setInterval(pollItem, 2000);
    pollItem();
  }
</script>

<script src="sounds.js"></script>
</body>
</html>
